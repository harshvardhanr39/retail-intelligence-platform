name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: Deploy FastAPI to Render ────────────────────
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "✅ Render deploy triggered"

  # ── Job 2: Run production pipeline ─────────────────────
  deploy-pipeline:
    name: Run Production Pipeline
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "multimethod==1.9.1" "pandera==0.17.2" --force-reinstall

      - name: Generate daily orders
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python generators/generate_daily_orders.py

      - name: Run inventory generator
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python generators/generate_inventory.py

      - name: Run orders extractor
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-1
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: python pipeline/extractors/orders_extractor.py

      - name: Run products extractor
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-1
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: python pipeline/extractors/products_extractor.py

      - name: Run inventory extractor
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-1
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: python pipeline/extractors/inventory_extractor.py

      - name: Run dbt transformations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          pip install dbt-postgres==1.7.4
          mkdir -p ~/.dbt
          # Parse DATABASE_URL to get individual connection params
          python3 << 'PYEOF'
          import os, re
          url = os.environ['DATABASE_URL']
          match = re.match(r'postgresql://([^:]+):([^@]+)@([^:/]+):?(\d+)?/(.+)', url)
          user, pwd, host, port, db = match.groups()
          port = port or '5432'
          profile = f"""retail_intelligence:
            target: prod
            outputs:
              prod:
                type: postgres
                host: {host}
                user: {user}
                password: {pwd}
                port: {int(port)}
                dbname: {db}
                schema: silver
                threads: 4
          """
          with open(os.path.expanduser('~/.dbt/profiles.yml'), 'w') as f:
              f.write(profile)
          print("✅ profiles.yml written")
          PYEOF
          cd dbt_project && dbt run && dbt test

      - name: Notify Slack success
        if: success()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H 'Content-type: application/json' \
          -d '{"text": "✅ *Production Deploy Complete*\nPipeline ran successfully on merge to main."}'

      - name: Notify Slack failure
        if: failure()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H 'Content-type: application/json' \
          -d '{"text": "❌ *Production Deploy FAILED*\nCheck GitHub Actions for details."}'
